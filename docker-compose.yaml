services:
  catalogue:
    build: ./catalogue
    image: jaswanth96/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  cart:
    build: ./cart
    image: jaswanth96/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  user:
    build: ./user
    image: jaswanth96/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  frontend:
    build: ./frontend
    image: jaswanth96/frontend:1.0.0
    container_name: frontend
    ports:
    - 80:80
    depends_on:
    - catalogue
    - cart
  mongodb:
    build: ./mongodb
    image: jaswanth96/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  
networks:
  default:
    driver: bridge
    name: roboshop
    external: false  # if true, you need to create network manually
